<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MarkdownViewer README</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --panel-2: #18223d;
      --text: #e8eefc;
      --muted: #9fb0d1;
      --line: #2a3658;
      --accent: #6ea8fe;
      --shadow: 0 10px 30px rgba(0,0,0,0.22);
      --code-bg: #0f172a;
      --code-text: #e5eefc;
      --scrollbar-track: #0f1730;
      --scrollbar-thumb: #3b4b79;
      --scrollbar-thumb-hover: #5470b6;
      --font: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
    }
    body.theme-light {
      --bg: #eef3fb;
      --panel: #ffffff;
      --panel-2: #f2f6fd;
      --text: #172033;
      --muted: #5e6c86;
      --line: #d8e0ee;
      --accent: #2f6feb;
      --shadow: 0 10px 30px rgba(25, 42, 70, 0.10);
      --scrollbar-track: #e7edf8;
      --scrollbar-thumb: #a6b8d8;
      --scrollbar-thumb-hover: #7d99c8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: var(--font); scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }
    * { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track); }
    *::-webkit-scrollbar { width: 12px; height: 12px; }
    *::-webkit-scrollbar-track { background: var(--scrollbar-track); border-radius: 999px; }
    *::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 999px; border: 2px solid var(--scrollbar-track); }
    *::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }
    body { line-height: 1.8; }
    .page { max-width: 1280px; margin: 0 auto; padding: 24px 20px 64px; }
    .topbar {
      position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 10px;
      padding: 10px 0 16px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--bg) 94%, transparent), color-mix(in srgb, var(--bg) 72%, transparent));
      backdrop-filter: blur(4px);
    }
    .title { font-weight: 700; font-size: 20px; margin-right: auto; }
    .topbar button {
      appearance: none; border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
      border-radius: 10px; padding: 8px 12px; cursor: pointer; transition: .15s ease;
    }
    .topbar button:hover { border-color: var(--accent); transform: translateY(-1px); }
    .topbar button.selected { outline: 2px solid var(--accent); }
    .hero {
      background: linear-gradient(180deg, var(--panel), color-mix(in srgb, var(--panel) 86%, var(--panel-2)));
      border: 1px solid var(--line); border-radius: 24px; padding: 28px; box-shadow: var(--shadow); margin-bottom: 24px;
    }
    .hero h1 { margin: 0 0 10px; font-size: 2.2rem; line-height: 1.2; }
    .lead { color: var(--muted); margin: 0 0 18px; }
    .badges { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border: 1px solid var(--line); background: var(--panel-2); border-radius: 999px; font-size: 13px; }
    .layout { display: grid; grid-template-columns: 300px minmax(0, 1fr); gap: 20px; align-items: start; }
    .toc {
      position: sticky; top: 74px; background: var(--panel); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow);
      padding: 16px; max-height: calc(100vh - 110px); overflow: auto;
    }
    .toc h2 { margin: 0 0 10px; font-size: 1rem; }
    .toc a {
      display: block; color: var(--muted); text-decoration: none; padding: 6px 8px; border-radius: 10px; font-size: 14px; line-height: 1.45; margin: 1px 0;
    }
    .toc a:hover { background: var(--panel-2); color: var(--accent); }
    .content { background: var(--panel); border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); padding: 24px 28px; min-width: 0; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 { line-height: 1.35; scroll-margin-top: 84px; }
    .markdown-body h1 { margin-top: 0; font-size: 2em; border-bottom: 1px solid var(--line); padding-bottom: .35em; }
    .markdown-body h2 { margin-top: 1.8em; font-size: 1.5em; border-bottom: 1px solid var(--line); padding-bottom: .25em; }
    .markdown-body h3 { margin-top: 1.4em; font-size: 1.2em; }
    .markdown-body h4 { margin-top: 1.2em; font-size: 1.05em; }
    .markdown-body p, .markdown-body ul, .markdown-body ol, .markdown-body blockquote { margin: 1em 0; }
    .markdown-body code { background: color-mix(in srgb, var(--panel-2) 85%, transparent); border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.95em; }
    .markdown-body pre { background: var(--code-bg); color: var(--code-text); border-radius: 16px; padding: 16px; overflow: auto; border: 1px solid #1e293b; }
    .markdown-body pre code { background: transparent; border: 0; color: inherit; padding: 0; }
    .markdown-body table { border-collapse: collapse; width: 100%; display: block; overflow: auto; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--line); padding: 8px 10px; }
    .markdown-body th { background: var(--panel-2); }
    .markdown-body blockquote { background: color-mix(in srgb, var(--panel-2) 65%, transparent); border-left: 4px solid var(--accent); padding: 12px 14px; border-radius: 0 12px 12px 0; }
    .markdown-body a { color: var(--accent); }
    .markdown-body .mermaid { background: #fff; border-radius: 14px; padding: 12px; overflow: auto; border: 1px solid var(--line); margin: 12px 0; }
    .footer { margin-top: 24px; color: var(--muted); font-size: 14px; text-align: center; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .toc { position: static; max-height: none; }
      .topbar { position: static; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="title">MarkdownViewer README</div>
      <button id="lightBtn">ライト</button>
      <button id="darkBtn">ダーク</button>
    </div>

    <section class="hero">
      <h1>MarkdownViewer</h1>
      <p class="lead">ローカルの Markdown / HTML / JSON ファイルを扱うための、単体 HTML ベースの 3 ペインビューアです。</p>
      <div class="badges">
        <span class="badge">左ペイン: ファイル一覧</span>
        <span class="badge">中央ペイン: プレビュー</span>
        <span class="badge">右ペイン: エディタ</span>
        <span class="badge">Markdown / HTML / JSON</span>
        <span class="badge">Mermaid 対応</span>
        <span class="badge">お気に入り対応</span>
        <span class="badge">D&D 対応</span>
      </div>
    </section>

    <div class="layout">
      <nav class="toc">
        <h2>目次</h2>
        <div id="tocBody"></div>
      </nav>

      <main class="content">
        <section id="readme" class="markdown-body"></section>
      </main>
    </div>

    <div class="footer">MarkdownViewer README HTML</div>
  </div>

  <script>
    const md = '# MarkdownViewer\n\nMarkdownViewer は、ローカルの **Markdown / HTML / JSON** ファイルを扱うための、**単体 HTML ベースの 3 ペインビューア** です。  \nChrome / Edge 系ブラウザを想定し、**閲覧・編集・プレビュー確認** を 1 画面で行えるようにしています。\n\n- 左ペイン: **ファイル一覧**\n- 中央ペイン: **プレビュー**\n- 右ペイン: **エディタ**\n\nこの README は、現在の最新版 **`MarkdownViewer_v36_fav_delete_confirm.html`** の仕様に合わせています。\n\n---\n\n## 対応ファイル\n\n- `.md`\n- `.html`\n- `.htm`\n- `.json`\n\n---\n\n## 全体構成\n\n### 左ペイン\n- ファイル一覧\n- ファイル名で絞り込み\n- 隠しファイル / 隠しフォルダ表示切替\n- 拡張子フィルタ\n- 展開深さ指定\n- お気に入り操作\n\n### 中央ペイン\n- Markdown / HTML / JSON のプレビュー\n- Markdown アウトライン表示\n- 現在ファイル再読込\n\n### 右ペイン\n- Markdown / JSON 編集\n- プレビュー反映\n- 保存\n\n---\n\n## 上部ツールバー\n\n### ルートフォルダを選択\n- File System Access API を使ってルートフォルダを選択します\n- ここで開いた場合のみ、元ファイルへの保存が可能です\n\n### 前回フォルダ再利用\n- 前回選択したフォルダを再利用します\n- ブラウザ側に権限が残っていれば、そのまま開けます\n\n### 更新\n- 左ペインのファイル一覧を更新します\n- 現在表示中の本文は自動では再読込しません\n\n### 自動更新: ON / OFF\n- 一定間隔で左ペイン一覧を更新します\n- 間隔は秒単位で設定できます\n\n### 間隔\n- 数値入力で自動更新の秒数を指定します\n\n### エディタ 表示/非表示\n- 右ペインの表示 / 非表示を切り替えます\n\n### テーマ切替\n- **ライト**\n- **ダーク**\n\n### ステータス表示\n- `0 files` のようなファイル数表示\n- `記憶: 保存済み / 一時のみ / なし / 非対応`\n- ルートパス表示\n\n---\n\n## 左ペイン: ファイル一覧\n\n### ファイル一覧\n- 選択したルートフォルダ配下の `.md / .html / .htm / .json` を再帰表示\n- フォルダ構造を維持したツリー表示\n- 現在開いているファイルをハイライト表示\n\n### ファイル名で絞り込み\n- ファイル名や相対パスの一部で絞り込めます\n\n### 拡張子フィルタ\n選択可能:\n- `すべて`\n- `.md`\n- `.html`\n- `.json`\n\n補足:\n- `.html` には `.htm` も含みます\n\n### 隠し\n- `.` で始まるファイル / フォルダの表示を切り替えます\n- 例: `.opencode` など\n- 設定は記憶されます\n\n### 展開\n選択可能:\n- `0` ～ `10`\n- `すべて`\n\n用途:\n- 深い階層のファイルまで自動展開したい場合に使用します\n\n### ファイル選択時の動作\n- 左ペイン全体を毎回再描画せず、選択ハイライトだけ更新します\n- そのため、展開状態やスクロール位置が崩れにくくなっています\n\n---\n\n## 左ペイン下部: お気に入り\n\nよく使うフォルダを **お気に入り** として登録できます。\n\n### 操作\n- **お気に入り登録**\n- **開く**\n- **編集**\n- **削除**\n- **↑**\n- **↓**\n\n### 編集できる内容\n- お気に入り名\n- **メモ入力（フルパス等）**\n\n### メモについて\nブラウザの仕様上、FileSystemHandle から **本物のフルパスを直接取得することはできません**。  \nそのため、フルパス等は **表示用メモ** として手入力で保持します。\n\n### マウスオーバー表示\n- お気に入り選択欄にマウスオーバーすると、保存済みメモを表示します\n\n### 並び替え\n- `↑` / `↓` ボタンで選択中のお気に入りを上下に移動できます\n- 並び順は保存されます\n\n### 削除確認\n- 削除ボタン押下時に確認メッセージを表示します\n\n---\n\n## 中央ペイン: プレビュー\n\n### Markdown\nMarkdown を HTML として表示します。\n\n対応例:\n- 見出し\n- 箇条書き\n- コードブロック\n- テーブル\n- 引用\n- リンク\n- 画像\n- 水平線\n\n### Mermaid 対応\nMarkdown 内の `mermaid` コードブロックを描画できます。\n\n例:\n\n```mermaid\nsequenceDiagram\n    participant 顧客\n    participant 営業\n    participant 事務\n    participant 配送\n\n    顧客->>営業: 商品の見積依頼\n    営業->>事務: 在庫と価格を確認\n    事務-->>営業: 見積条件を回答\n    営業-->>顧客: 見積書を送付\n    顧客->>営業: 発注\n    営業->>事務: 受注登録\n    事務->>配送: 出荷指示\n    配送-->>顧客: 商品を納品\n    顧客-->>営業: 受領連絡\n```\n\n### HTML\n- `iframe` で表示します\n- HTML はプレビュー専用です\n\n### JSON\n- 整形表示\n- 折りたたみ可能なツリー表示\n- **すべて展開**\n- **すべて折りたたむ**\n\n不正な JSON の場合は、整形テキスト表示にフォールバックします。\n\n### 現在ファイル再読込\n- 開いているファイル本文だけを再読込します\n- 一覧更新とは分離されています\n\n---\n\n## 中央ペイン内: アウトライン\n\nMarkdown の `h1` ～ `h6` からアウトラインを自動生成します。\n\n### 機能\n- **アウトライン: ON / OFF**\n- 中央ペイン内の左側に表示\n- 独立スクロール\n- 追従表示\n- 幅変更可能\n- 項目クリックで該当見出しへ移動\n\n### アウトラインクリック時の連動\n- **プレビュー側** を該当見出しへスクロール\n- **エディタ側** も対応する見出し位置へスクロール\n\n### 記憶\n- ON / OFF\n- 幅\n\nを記憶します。\n\n---\n\n## 右ペイン: エディタ\n\n### 編集対象\n- Markdown\n- JSON\n\nHTML は編集対象外です。\n\n### ボタン\n- **プレビュー反映**\n- **保存**\n\n### 保存\n- `ルートフォルダを選択` で開いた Markdown / JSON は保存可能です\n- HTML は保存対象外です\n\n### スクロール同期\nMarkdown 表示時は、中央プレビューと右エディタのスクロールを同期します。\n\n補足:\n- 行単位ではなく、**全体高さの比率ベース** の同期です\n- Markdown 原文と描画後 HTML の高さは一致しないため、この方式を採用しています\n\n---\n\n## ドラッグ＆ドロップ対応\n\n画面全体へ `.md / .html / .htm / .json` を **ドラッグ＆ドロップ** して開けます。\n\n### 仕様\n- 左ペインのツリーは維持\n- ドロップしたファイルは **一時ファイル** として開く\n- 中央 / 右ペインだけで内容を表示\n- 種別表示に `一時ファイル` を付加\n\n### 制限\n- ドラッグ＆ドロップで開いた一時ファイルは **上書き保存できません**\n- 保存ボタン押下時は、その旨のメッセージを表示します\n\n---\n\n## ペイン幅調整\n\nドラッグで幅変更可能:\n- 左ペイン ↔ 中央ペイン\n- 中央ペイン ↔ 右ペイン\n- アウトライン ↔ プレビュー\n\n変更した幅は保存され、次回起動時にも復元されます。\n\n---\n\n## テーマ\n\n### 対応テーマ\n- ライト\n- ダーク\n\n### テーマ連動するもの\n- 背景色\n- パネル色\n- テキスト色\n- ボタン色\n- スクロールバー色\n- splitter 色\n\n---\n\n## 自動更新の仕様\n\n### 自動更新で行うこと\n- ルートフォルダ配下の対象ファイル再走査\n- 左ペイン一覧更新\n- 開いているファイルへの参照情報更新\n\n### 自動更新で行わないこと\n- 現在表示中ファイル本文の再読込\n- プレビューの自動再描画\n- エディタ内容の自動上書き\n\n### 補足\n現在の実装では、**Markdown 編集中にエディタへフォーカスがある場合**、  \n自動更新をスキップする動作があります。\n\n---\n\n## 保存される設定\n\n### localStorage\n- テーマ\n- エディタ表示 / 非表示\n- 自動更新 ON / OFF\n- 自動更新間隔\n- 前回開いていたファイルパス\n- 左ペイン幅\n- 右ペイン幅\n- アウトライン表示 ON / OFF\n- アウトライン幅\n- 拡張子フィルタ\n- 隠しファイル表示 ON / OFF\n- 展開深さ\n- お気に入りID一覧\n- お気に入り名 / メモ\n\n### IndexedDB\n- 前回選択したルートフォルダの FileSystemHandle\n- お気に入りフォルダの FileSystemHandle\n\n---\n\n## 動作要件\n\n### 推奨ブラウザ\n- Google Chrome\n- Microsoft Edge\n\n### 使用 API\n- File System Access API\n- IndexedDB\n- localStorage\n\n---\n\n## 制約・注意点\n\n### 1. ブラウザ単体 HTML の制約\nこのツールは単体 HTML として動作します。  \nそのため、HTML ファイル自身の場所は分かっても、その親フォルダ配下をブラウザが自動列挙することはできません。\n\n### 2. 最初に必要な操作\n最初に **「ルートフォルダを選択」** が必要です。\n\n### 3. 編集対象\n- 編集可能: Markdown / JSON\n- プレビュー専用: HTML\n\n### 4. フルパス\nブラウザの仕様上、本物のフルパスは取得できません。  \nお気に入りのメモは、表示用に手入力する文字列です。\n\n### 5. スクロール同期\n完全一致ではなく、比率ベース同期です。\n\n---\n\n## 想定用途\n- ローカル Markdown ドキュメントの閲覧\n- README / 手順書 / 設計メモの確認\n- Markdown / JSON 編集とプレビュー確認\n- Mermaid を含む技術文書の閲覧\n- ドキュメントフォルダの横断確認\n\n---\n\n## トラブルシュート\n\n### ルートフォルダ選択が動かない\n- Chrome / Edge で開いているか確認\n- File System Access API が使える環境か確認\n- 制限の強い環境では動かない場合があります\n\n### 前回フォルダ再利用が効かない\n- ブラウザが前回権限を保持していない可能性があります\n- その場合は再度ルートフォルダを選択してください\n\n### Mermaid が表示されない\n- コードブロックが ` ```mermaid ` 形式か確認\n- 記法エラーがないか確認\n\n### アウトラインが出ない\n- Markdown ファイルを開いているか確認\n- 見出しが存在するか確認\n- アウトラインが OFF になっていないか確認\n\n### JSON が折りたためない\n- JSON の構文が正しいか確認\n- 不正な JSON の場合はテキスト表示になります\n\n### 隠しファイルが見えない\n- 左ペイン上部の **`隠し`** を ON にしてください\n\n---\n\n## 補足\n必要に応じて以下を追記してください。\n- ライセンス\n- 更新履歴\n- 作成者\n- 配布方法\n- 既知の制限事項\n';
    const THEME_KEY = 'markdownviewer_readme_theme';

    function slugify(text, index) {
      const base = String(text || '').trim().toLowerCase().replace(/<[^>]+>/g, '').replace(/[\s\u3000]+/g, '-').replace(/[^\w\-ぁ-んァ-ヶ一-龠々ー]/g, '');
      return (base || 'heading') + '-' + index;
    }

    function applyTheme(theme) {
      const mode = theme === 'light' ? 'light' : 'dark';
      document.body.classList.toggle('theme-light', mode === 'light');
      document.getElementById('lightBtn').classList.toggle('selected', mode === 'light');
      document.getElementById('darkBtn').classList.toggle('selected', mode === 'dark');
      localStorage.setItem(THEME_KEY, mode);
    }

    function restoreTheme() {
      const saved = localStorage.getItem(THEME_KEY) || 'dark';
      applyTheme(saved);
    }

    function buildToc() {
      const body = document.getElementById('readme');
      const tocBody = document.getElementById('tocBody');
      tocBody.innerHTML = '';
      const headings = body.querySelectorAll('h1, h2, h3, h4, h5, h6');
      headings.forEach((h, idx) => {
        if (!h.id) h.id = slugify(h.textContent, idx + 1);
        const level = parseInt(h.tagName.substring(1), 10);
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent.trim();
        a.style.paddingLeft = (8 + (level - 1) * 14) + 'px';
        tocBody.appendChild(a);
      });
    }

    async function renderMermaids() {
      const readme = document.getElementById('readme');
      const mermaidBlocks = readme.querySelectorAll('pre code.language-mermaid, pre code.lang-mermaid');
      mermaidBlocks.forEach((code) => {
        const pre = code.closest('pre');
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        pre.replaceWith(div);
      });

      if (!window.mermaid) return;
      const mode = document.body.classList.contains('theme-light') ? 'default' : 'dark';
      mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: mode });

      const nodes = document.querySelectorAll('.mermaid');
      for (let i = 0; i < nodes.length; i++) {
        const node = nodes[i];
        const src = node.textContent;
        try {
          const id = 'mmd-' + i + '-' + Date.now();
          const rendered = await mermaid.render(id, src);
          node.innerHTML = rendered.svg || rendered;
        } catch (e) {
          const esc = src.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          node.innerHTML = '<pre><code>' + esc + '</code></pre>';
        }
      }
    }

    async function renderAll() {
      const readme = document.getElementById('readme');
      readme.innerHTML = marked.parse(md);
      buildToc();
      await renderMermaids();
    }

    document.getElementById('lightBtn').addEventListener('click', async () => {
      applyTheme('light');
      await renderAll();
    });
    document.getElementById('darkBtn').addEventListener('click', async () => {
      applyTheme('dark');
      await renderAll();
    });

    restoreTheme();
    renderAll();
  </script>
</body>
</html>
